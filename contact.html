<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Carlo Tulin | Junior Developer</title>

    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="contact">

    <div id="site-navbar"></div>
    <noscript>
        <p style="text-align:center; padding: 1rem; background:#0b0b0f; color:#fff;">
            This site uses a little JavaScript to build the navigation and footer. Please enable JavaScript to view it properly.
        </p>
    </noscript>

    <main>
    <section class="contact-section">
        <div class="container">

            <!-- page heading lives up here now, same pattern as the other
                 pages, instead of being crammed inside the dark panel below -->
            <p class="eyebrow text-center fade-in fade-in-1">// get in touch</p>
            <h2 class="section-title text-center mb-2 fade-in fade-in-1">Let's build something together.</h2>
            <p class="text-center section-sub mb-5 fade-in fade-in-2">
                Have a project in mind or just want to say hi? Pick whichever works best for you.
            </p>

            <!-- dark intro panel on the left is just the short pitch + socials
                 now, contact rows on the right do the actual work -->
            <div class="contact-shell fade-in fade-in-2">
                <div class="contact-intro">
                    <span class="status-pill"><span class="status-dot"></span>Open to junior developer roles</span>
                    <p class="contact-intro-text">
                        I'm based in Tanza, Cavite and usually check messages daily.
                        Reach out through whichever channel is easiest for you.
                    </p>
                    <div class="d-flex gap-3 socials mt-2">
                        <a href="https://www.facebook.com/kaloizkie.22" target="_blank" rel="noopener" aria-label="Facebook"><i class='bx bxl-facebook'></i></a>
                        <a href="https://www.linkedin.com/in/john-carlo-tulin-809158369/" target="_blank" rel="noopener" aria-label="LinkedIn"><i class='bx bxl-linkedin'></i></a>
                        <a href="https://github.com/JohnCGT" target="_blank" rel="noopener" aria-label="GitHub"><i class='bx bxl-github'></i></a>
                    </div>
                </div>

                <!-- filled by renderContactMethods() from SITE_DATA.contactMethods -->
                <div id="contact-methods-grid" class="contact-list"></div>
            </div>
        </div>
    </section>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/site-data.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
